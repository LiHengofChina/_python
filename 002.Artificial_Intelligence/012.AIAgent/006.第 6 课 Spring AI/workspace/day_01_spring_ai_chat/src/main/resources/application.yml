server:
  port: 8099

spring:
  application:
    name: day01-spring-ai-chat

  ai:
    ollama:
      # Ollama 服务地址（本机默认 11434；内网部署改成实际 IP）
      base-url: http://127.0.0.1:11434
      chat:
        options:
          model: qwen2.5:7b
          temperature: 0.3

# 启动后在控制台打印一次示例对话；设为 false 可关闭
demo:
  chat:
    startup-enabled: true
    startup-question: 用一句话介绍什么是 Spring AI


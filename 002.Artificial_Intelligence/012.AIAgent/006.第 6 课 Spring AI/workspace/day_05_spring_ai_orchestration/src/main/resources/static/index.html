<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>运维 Agent 编排 · SSE Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      background: #1e293b;
      color: #fff;
      font-size: 15px;
      text-align: center;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      text-align: left;
    }
    .msg.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e2e8f0;
      width: 85%;
      padding: 14px 16px;
    }
    /* Cursor 风格编排步骤 */
    .steps {
      margin-bottom: 14px;
      text-align: left;
    }
    .steps-label {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
      letter-spacing: 0.02em;
    }
    .step-timeline {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .cursor-step {
      border-radius: 8px;
      overflow: hidden;
      background: #fafafa;
      border: 1px solid #ececec;
      transition: border-color 0.2s, background 0.2s;
    }
    .cursor-step.running {
      border-color: #d4d4d8;
      background: #f9fafb;
    }
    .cursor-step.done {
      border-color: #e5e7eb;
    }
    .cursor-step-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      color: #374151;
    }
    .cursor-step-header:hover {
      background: #f3f4f6;
    }
    .cursor-step-icon {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #6b7280;
    }
    .cursor-step-label {
      flex: 1;
      font-weight: 500;
      color: #1f2937;
    }
    .cursor-step-badge {
      font-size: 11px;
      color: #9ca3af;
      font-weight: 400;
    }
    .cursor-step-status {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cursor-step-status .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid #e5e7eb;
      border-top-color: #6b7280;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .cursor-step-status .check {
      color: #22c55e;
      font-size: 13px;
      line-height: 1;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .cursor-chevron {
      flex-shrink: 0;
      color: #9ca3af;
      font-size: 14px;
      transition: transform 0.2s;
      line-height: 1;
    }
    .cursor-step.collapsed .cursor-chevron {
      transform: rotate(-90deg);
    }
    .cursor-step-body {
      border-top: 1px solid #ececec;
      padding: 0;
    }
    .cursor-step.collapsed .cursor-step-body {
      display: none;
    }
    .cursor-step-preview {
      padding: 6px 10px 8px 36px;
      font-size: 12px;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cursor-step.collapsed .cursor-step-preview {
      display: block;
    }
    .cursor-step:not(.collapsed) .cursor-step-preview {
      display: none;
    }
    .cursor-step-code {
      margin: 0;
      padding: 10px 12px;
      font-family: "Cascadia Code", "Consolas", "Menlo", monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #3f3f46;
      background: #f4f4f5;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
    }
    .answer-block {
      margin-top: 4px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }
    .answer-block h4 {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
    }
    .answer-text {
      font-size: 14px;
      line-height: 1.65;
      color: #1f2937;
    }
    .streaming::after {
      content: "▋";
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    footer {
      padding: 16px 20px;
      background: #fff;
      border-top: 1px solid #e2e8f0;
    }
    #chat-form {
      display: flex;
      gap: 8px;
      max-width: 900px;
      margin: 0 auto;
    }
    #prompt-input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      resize: none;
      min-height: 44px;
      max-height: 120px;
    }
    button {
      padding: 0 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    #send-btn {
      background: #2563eb;
      color: #fff;
    }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #stop-btn {
      background: #e2e8f0;
      color: #334155;
    }
    #stop-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>运维 Agent 编排 Demo · SSE 逐步推送（day_05）</header>
  <div id="chat-messages"></div>
  <footer>
    <form id="chat-form">
      <textarea id="prompt-input" rows="1" placeholder="例如：linux-231 磁盘快满了，请排查"></textarea>
      <button type="submit" id="send-btn">发送</button>
      <button type="button" id="stop-btn" disabled>停止</button>
    </form>
  </footer>

  <script>
    const chatMessages = document.getElementById('chat-messages');
    const chatForm = document.getElementById('chat-form');
    const promptInput = document.getElementById('prompt-input');
    const sendBtn = document.getElementById('send-btn');
    const stopBtn = document.getElementById('stop-btn');

    let chatAbortController = null;

    function appendUserMessage(text) {
      const el = document.createElement('div');
      el.className = 'msg user';
      el.textContent = text;
      chatMessages.appendChild(el);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function createAssistantShell() {
      const el = document.createElement('div');
      el.className = 'msg assistant';

      const steps = document.createElement('div');
      steps.className = 'steps';
      steps.innerHTML = '<p class="steps-label">Agent 编排</p><div class="step-timeline"></div>';
      const timeline = steps.querySelector('.step-timeline');

      const answerBlock = document.createElement('div');
      answerBlock.className = 'answer-block';
      answerBlock.innerHTML = '<h4>最终建议</h4>';
      const answerEl = document.createElement('div');
      answerEl.className = 'answer-text';
      answerBlock.appendChild(answerEl);

      el.appendChild(steps);
      el.appendChild(answerBlock);
      chatMessages.appendChild(el);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      return { root: el, stepsEl: timeline, answerEl };
    }

    const STEP_META = {
      1: { icon: '◎', badge: 'LLM' },
      2: { icon: '⌕', badge: 'RAG' },
      3: { icon: '▸', badge: 'SSH' },
      4: { icon: '◇', badge: 'LLM' },
      5: { icon: '◇', badge: 'LLM' },
    };

    function stepIcon(order) {
      return (STEP_META[order] || { icon: '•', badge: '' }).icon;
    }

    function stepBadge(order) {
      return (STEP_META[order] || { icon: '•', badge: '' }).badge;
    }

    function toggleStep(item) {
      item.classList.toggle('collapsed');
    }

    function renderStep(stepsEl, payload) {
      const id = 'step-' + payload.order;
      let item = document.getElementById(id);
      const output = payload.output || '（执行中…）';
      const preview = output.replace(/\s+/g, ' ').slice(0, 80);

      if (!item) {
        item = document.createElement('div');
        item.id = id;
        item.className = 'cursor-step running';
        item.innerHTML = `
          <div class="cursor-step-header">
            <span class="cursor-step-icon"></span>
            <span class="cursor-step-label"></span>
            <span class="cursor-step-badge"></span>
            <span class="cursor-step-status"></span>
            <span class="cursor-chevron">›</span>
          </div>
          <div class="cursor-step-preview"></div>
          <div class="cursor-step-body"><pre class="cursor-step-code"></pre></div>
        `;
        item.querySelector('.cursor-step-header').addEventListener('click', () => toggleStep(item));
        stepsEl.appendChild(item);
      }

      item.querySelector('.cursor-step-icon').textContent = stepIcon(payload.order);
      item.querySelector('.cursor-step-label').textContent = payload.name;
      const badge = stepBadge(payload.order);
      item.querySelector('.cursor-step-badge').textContent = badge ? ` · ${badge}` : '';
      item.querySelector('.cursor-step-code').textContent = output;
      item.querySelector('.cursor-step-preview').textContent = preview;

      const isDone = payload.output && payload.output !== '（执行中…）';
      if (isDone) {
        item.classList.remove('running');
        item.classList.add('done', 'collapsed');
        item.querySelector('.cursor-step-status').innerHTML = '<span class="check">✓</span>';
      } else {
        item.querySelector('.cursor-step-status').innerHTML = '<span class="spinner"></span>';
      }
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function createSseParser(onEvent) {
      let buffer = '';
      return (chunk) => {
        buffer += chunk;
        const parts = buffer.split('\n\n');
        buffer = parts.pop() ?? '';
        for (const part of parts) {
          if (!part.trim()) continue;
          let event = 'message';
          const dataLines = [];
          for (const line of part.split('\n')) {
            if (line.startsWith('event:')) event = line.slice(6).trim();
            else if (line.startsWith('data:')) dataLines.push(line.slice(5).trimStart());
          }
          if (dataLines.length) onEvent(event, dataLines.join('\n'));
        }
      };
    }

    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const prompt = promptInput.value.trim();
      if (!prompt || chatAbortController) return;

      appendUserMessage(prompt);
      promptInput.value = '';

      const { stepsEl, answerEl } = createAssistantShell();
      answerEl.classList.add('streaming');

      chatAbortController = new AbortController();
      sendBtn.disabled = true;
      stopBtn.disabled = false;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
          signal: chatAbortController.signal,
        });

        if (!response.ok) throw new Error('HTTP ' + response.status);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        const parse = createSseParser((event, data) => {
          if (event === 'done' || data === '[DONE]') return;
          if (event === 'error') {
            const err = JSON.parse(data);
            answerEl.textContent += '\n[错误] ' + err.message;
            return;
          }
          if (event === 'step') {
            renderStep(stepsEl, JSON.parse(data));
            return;
          }
          if (event === 'answer') {
            const body = JSON.parse(data);
            answerEl.textContent = body.content || '';
            chatMessages.scrollTop = chatMessages.scrollHeight;
          }
        });

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          parse(decoder.decode(value, { stream: true }));
        }
      } catch (err) {
        if (err.name !== 'AbortError') {
          answerEl.textContent += '\n[错误] ' + err.message;
        }
      } finally {
        answerEl.classList.remove('streaming');
        chatAbortController = null;
        sendBtn.disabled = false;
        stopBtn.disabled = true;
      }
    });

    stopBtn.addEventListener('click', () => chatAbortController?.abort());

    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        chatForm.requestSubmit();
      }
    });
  </script>
</body>
</html>

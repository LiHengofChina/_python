server:
  port: 8104

spring:
  application:
    name: day07-lan-mcp-server-01
  config:
    import: optional:classpath:application-local.yml
  ai:
    mcp:
      server:
        name: ops-mcp-server
        version: 1.0.0
        type: SYNC
        instructions: |
          银行运维 MCP Server（Day07 局域网部署）。
          提供 Linux 只读排查 Tool（磁盘、内存、/var/log 等）。
          hostId 参数填 linux-231。
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false

demo:
  ops:
    ssh:
      enabled: true
      host: 192.168.100.231
      port: 22
      username: root
      host-label: linux-231

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day08 Memory 多轮对话</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; }
    h1 { text-align: center; font-size: 1.25rem; }
    #cid { width: 100%; margin-bottom: 8px; padding: 8px; box-sizing: border-box; }
    #messages { border: 1px solid #ddd; border-radius: 8px; min-height: 280px; padding: 12px; margin-bottom: 12px; }
    .msg { margin: 8px 0; }
    .user { color: #1a56db; }
    .bot { color: #111; }
    .row { display: flex; gap: 8px; }
    #input { flex: 1; padding: 8px; }
    button { padding: 8px 16px; cursor: pointer; }
    .hint { color: #666; font-size: 0.85rem; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Day08 Memory 多轮对话</h1>
  <label>会话 ID（同一 ID 才能记住上下文）：</label>
  <input id="cid" type="text" value="user-001">
  <div id="messages"></div>
  <div class="row">
    <input id="input" type="text" placeholder="输入消息，例如：我叫小张">
    <button onclick="send()">发送</button>
  </div>
  <p class="hint">先试「我叫运维小张」，再问「我刚才说我叫什么」。</p>
  <script>
    const cidEl = document.getElementById('cid');
    const inputEl = document.getElementById('input');
    const messagesEl = document.getElementById('messages');
    cidEl.value = localStorage.getItem('day08-cid') || 'user-001';

    function append(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = (role === 'user' ? '你：' : 'AI：') + text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function send() {
      const q = inputEl.value.trim();
      const cid = cidEl.value.trim();
      if (!q || !cid) return;
      localStorage.setItem('day08-cid', cid);
      append('user', q);
      inputEl.value = '';
      try {
        const res = await fetch('/api/memory/chat?q=' + encodeURIComponent(q) + '&cid=' + encodeURIComponent(cid));
        const data = await res.json();
        append('bot', data.answer || JSON.stringify(data));
      } catch (e) {
        append('bot', '请求失败：' + e.message);
      }
    }

    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  </script>
</body>
</html>

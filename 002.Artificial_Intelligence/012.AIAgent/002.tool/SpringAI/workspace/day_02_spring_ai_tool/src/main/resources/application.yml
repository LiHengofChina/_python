server:
  port: 8100

spring:
  application:
    name: day02-spring-ai-tool
  config:
    import: optional:classpath:application-local.yml
  ai:
    ollama:
      base-url: http://127.0.0.1:11434
      chat:
        options:
          model: qwen2.5:7b
          temperature: 0.2

demo:

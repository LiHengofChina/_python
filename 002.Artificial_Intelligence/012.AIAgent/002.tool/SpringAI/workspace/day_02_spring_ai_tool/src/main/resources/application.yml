    startup-enabled: true
    startup-question: 用一句话介绍什么是 Spring AI
  ops:
    ssh:
      enabled: true
      host: 192.168.100.231
      port: 22
      username: root
      host-label: linux-231
      # 密码写在 application-local.yml，勿提交 Git
